name: Open main to self-hosted PR

on:
  push:
    branches:
      - main
  schedule:
    - cron: '23,53 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: open-main-to-self-hosted-pr
  cancel-in-progress: false

env:
  MAIN_BRANCH: main
  SELF_HOSTED_BRANCH: self-hosted
  SYNC_BRANCH: codex/main-to-self-hosted

jobs:
  open-pr:
    name: Open integration PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SELF_HOSTED_BRANCH }}
          fetch-depth: 0

      - name: Prepare integration branch
        id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch --prune origin \
            "+refs/heads/${MAIN_BRANCH}:refs/remotes/origin/${MAIN_BRANCH}" \
            "+refs/heads/${SELF_HOSTED_BRANCH}:refs/remotes/origin/${SELF_HOSTED_BRANCH}"
          git fetch --prune origin \
            "+refs/heads/${SYNC_BRANCH}:refs/remotes/origin/${SYNC_BRANCH}" || true

          main_sha="$(git rev-parse "origin/${MAIN_BRANCH}")"
          self_hosted_sha="$(git rev-parse "origin/${SELF_HOSTED_BRANCH}")"
          existing_pr="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "${SYNC_BRANCH}" \
            --base "${SELF_HOSTED_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          {
            echo "main_sha=$main_sha"
            echo "self_hosted_sha=$self_hosted_sha"
            echo "existing_pr=$existing_pr"
          } >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "$main_sha" "$self_hosted_sha"; then
            echo "needs_pr=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Main to self-hosted"
              echo ""
              echo "\`${MAIN_BRANCH}\` is already included in \`${SELF_HOSTED_BRANCH}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "codex-self-hosted-sync-bot"
          git config user.email "actions@github.com"
          git switch --force-create "${SYNC_BRANCH}" "origin/${SELF_HOSTED_BRANCH}"
          git merge --no-ff "origin/${MAIN_BRANCH}" -m "Merge main into self-hosted"
          git push --force-with-lease origin "${SYNC_BRANCH}"

          echo "needs_pr=true" >> "$GITHUB_OUTPUT"
          {
            echo "## Main to self-hosted"
            echo ""
            echo "- Main: \`${main_sha}\`"
            echo "- Self-hosted: \`${self_hosted_sha}\`"
            echo "- Integration branch: \`${SYNC_BRANCH}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update pull request
        if: steps.prepare.outputs.needs_pr == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          EXISTING_PR: ${{ steps.prepare.outputs.existing_pr }}
          MAIN_SHA: ${{ steps.prepare.outputs.main_sha }}
          SELF_HOSTED_SHA: ${{ steps.prepare.outputs.self_hosted_sha }}
        run: |
          set -euo pipefail

          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          ## Main to self-hosted

          This PR merges \`${MAIN_BRANCH}\` into \`${SELF_HOSTED_BRANCH}\` so self-hosted keeps up with the clean upstream mirror.

          - Main: \`${MAIN_SHA}\`
          - Self-hosted before merge: \`${SELF_HOSTED_SHA}\`
          - Created by: \`${GITHUB_WORKFLOW}\`
          EOF

          title="Merge main into self-hosted"
          if [ -n "$EXISTING_PR" ]; then
            existing_pr="$EXISTING_PR"
            gh pr edit "$existing_pr" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body-file "$body_file"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "${SELF_HOSTED_BRANCH}" \
              --head "${SYNC_BRANCH}" \
              --title "$title" \
              --body-file "$body_file"
          fi
